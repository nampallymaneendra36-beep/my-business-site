{% extends "base.html" %}

{% block title %}Contact{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1>Contact Pure Prosperity Cyber</h1>
        <p>Tell us about your security requirement and we will get back to you.</p>

        <form method="POST">
            <input type="text" name="name" placeholder="Your Name" required><br><br>
            <input type="email" name="email" placeholder="Your Email" required><br><br>
            <input type="text" name="subject" placeholder="Subject" required><br><br>
            <textarea name="message" placeholder="Tell us about your requirement" rows="6" required></textarea><br><br>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>
</section>
{% endblock %}
