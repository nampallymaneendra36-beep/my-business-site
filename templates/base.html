<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pure Prosperity Cyber{% endblock %}</title>

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="logo">Pure Prosperity Cyber</div>

    <ul class="nav-links">
        <li><a href="{{ url_for('main.index') }}">Home</a></li>
        <li><a href="{{ url_for('main.services') }}">Services</a></li>
        <li><a href="{{ url_for('contact.contact') }}">Contact</a></li>

        {% if current_user.is_authenticated %}
            <li><a href="{{ url_for('main.dashboard') }}">Dashboard</a></li>

            {% if current_user.is_admin %}
                <li><a href="{{ url_for('main.soc_dashboard') }}">SOC</a></li>
            {% endif %}

            <li><a href="{{ url_for('main.my_requests') }}">My Requests</a></li>
            <li><a href="{{ url_for('auth.logout') }}">Logout</a></li>
        {% else %}
            <li><a href="{{ url_for('auth.login') }}">Login</a></li>
        {% endif %}
    </ul>
</nav>

{% block content %}{% endblock %}

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 900,
        once: true,
        offset: 80
    });

    const terminalLines = [
        "[SCAN] Initializing security scan...",
        "[OK] Firewall active",
        "[OK] Web Application Firewall enabled",
        "[ALERT] Suspicious IP blocked",
        "[WAF] SQL Injection attempt prevented",
        "[STATUS] Business protection active"
    ];

    const terminalBox = document.getElementById("terminal-output");

    if (terminalBox) {
        let index = 0;

        function addLine() {
            if (index < terminalLines.length) {
                const line = document.createElement("div");
                line.textContent = terminalLines[index];
                terminalBox.appendChild(line);
                index++;
                setTimeout(addLine, 700);
            }
        }

        addLine();
    }
</script>

</body>
</html>
