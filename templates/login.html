{% extends "base.html" %}

{% block title %}Login | Pure Prosperity Cyber{% endblock %}

{% block content %}

<section class="auth-page">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Sign in to your Pure Prosperity Cyber account</p>

        <form method="POST">
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" name="email" placeholder="Enter email or username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-primary full-btn">Sign In</button>
        </form>

        <p class="auth-link">
            Don’t have an account?
            <a href="{{ url_for('auth.register') }}">Create one</a>
        </p>
    </div>
</section>

{% endblock %}
